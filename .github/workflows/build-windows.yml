name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "electron/**"
      - "public/**"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"

jobs:
  build-windows:
    name: Build Windows installer and portable EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build Windows app
        run: npm run dist:win

      - name: Upload Windows EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gtis-id-print-station-windows
          path: release/*.exe
          if-no-files-found: error
